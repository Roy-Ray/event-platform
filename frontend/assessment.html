<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assessment Live</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Question <span id="q-number">1</span></h2>
        
        <div class="timer-display">Time Left: <span id="timer">00:00</span></div>
        
        <!-- Dynamic Question Area -->
        <div id="question-container">
            <p>Loading question...</p>
        </div>
        
        <button id="next-btn" class="btn">Submit & Next</button>
    </div>

    <!-- Script linked without 'js/' path -->
    <script src="app.js"></script>
</body>
</html>
