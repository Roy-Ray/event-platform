<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Judge Control Panel</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        .tab-container { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { background: rgba(255,255,255,0.1); border: 1px solid var(--border-color); color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; flex: 1; font-weight: bold; }
        .tab-btn.active { background: var(--neon-cyan); color: #000; box-shadow: 0 0 15px rgba(0,240,255,0.4); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .crud-form { background: rgba(0,0,0,0.2); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--neon-pink); }
    </style>
</head>
<body>
    <header class="event-header">
        <h1>⚖️ Judge Control Panel</h1>
        <div class="status-badge" style="border-color: var(--neon-pink); color: var(--neon-pink); box-shadow: 0 0 15px rgba(255,0,127,0.2);">
            Restricted Access
        </div>
    </header>

    <div class="container">
        <!-- Judge Login Section -->
        <div id="judge-login-section" class="card" style="max-width: 400px; margin: 40px auto;">
            <h2 style="text-align: center; color: var(--neon-pink);">Judge Authentication</h2>
            <label>Enter Secret Judge Code</label>
            <input type="password" id="judgeCode" placeholder="e.g., JUDGE-001" required>
            <button id="judge-login-btn" class="btn" style="margin-top: 10px;">Authorize</button>
            
            <!-- NEW: Back to Dashboard Button -->
            <div style="text-align: center; margin-top: 25px;">
                <a href="index.html" style="color: var(--neon-cyan); text-decoration: none; font-size: 14px; border: 1px solid var(--neon-cyan); padding: 8px 16px; border-radius: 20px; transition: 0.3s; display: inline-block;">
                    ⬅ Back to Dashboard
                </a>
            </div>
        </div>

        <!-- Judge Dashboard Section -->
        <div id="judge-dashboard" style="display: none;">
            <div style="text-align: right; margin-bottom: 20px;">
                Logged in as: <strong id="judge-name-display" style="color: var(--neon-cyan);"></strong>
                <button onclick="logoutJudge()" style="background: transparent; border: none; color: var(--neon-pink); cursor: pointer; text-decoration: underline; margin-left: 15px;">Log Out</button>
            </div>

            <!-- Tabs -->
            <div class="tab-container">
                <button class="tab-btn active" onclick="switchTab('grading-tab', this)">📝 Grade Submissions</button>
                <button class="tab-btn" onclick="switchTab('questions-tab', this)">⚙️ Manage Questions</button>
            </div>

            <!-- TAB 1: Grading -->
            <div id="grading-tab" class="tab-content active card">
                <h3 style="color: var(--neon-cyan);">Evaluate Participant Answers</h3>
                <div id="submissions-list">
                    <p>Loading submissions...</p>
                </div>
            </div>

            <!-- TAB 2: Manage Questions (CRUD) -->
            <div id="questions-tab" class="tab-content card">
                <h3 style="color: var(--neon-pink);">Question Database</h3>
                
                <!-- Add / Edit Form -->
                <div class="crud-form">
                    <h4 id="form-title" style="margin-top: 0;">➕ Add New Question</h4>
                    <input type="hidden" id="edit-q-id">
                    
                    <label>Day Number:</label>
                    <input type="number" id="qDay" value="1" min="1" max="5">
                    
                    <label>Question Type:</label>
                    <select id="qType" onchange="toggleMCQFields()">
                        <option value="paragraph">Paragraph / Written Opinion</option>
                        <option value="fill_blank">Short Answer</option>
                        <option value="mcq">Multiple Choice (MCQ)</option>
                    </select>
                    
                    <label>Question Text:</label>
                    <textarea id="qText" rows="3"></textarea>

                    <!-- Auto-Grading & MCQ Fields -->
                    <div id="mcq-fields" style="display: none; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; margin-bottom: 10px;">
                        <div id="options-container" style="display: none;">
                            <label style="color: var(--neon-cyan);">MCQ Options (JSON Format):</label>
                            <input type="text" id="qOptions" placeholder='{"a":"Option 1", "b":"Option 2"}'>
                        </div>
                        <label style="color: var(--neon-cyan);">Correct Answer (For Auto-Grading):</label>
                        <input type="text" id="qCorrect" placeholder="e.g., a">
                    </div>
                    
                    <label>Time Limit (in seconds):</label>
                    <input type="number" id="qTime" value="300" min="10">

                    <label>Max Marks (Weight of question):</label>
                    <input type="number" id="qMarks" value="10" min="1">
                    
                    <button id="save-q-btn" class="btn" style="background: var(--neon-cyan); color: #000;" onclick="saveQuestion()">Save Question</button>
                    <button id="cancel-edit-btn" class="btn" style="background: gray; display: none; margin-top: 10px;" onclick="cancelEdit()">Cancel Edit</button>
                </div>

                <!-- List of Questions -->
                <ul id="admin-questions-list" class="leaderboard-list">
                    <p>Loading questions...</p>
                </ul>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        function switchTab(tabId, btnElement) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btnElement.classList.add('active');
        }

        // Toggles the extra MCQ / Grading fields based on question type
        function toggleMCQFields() {
            const type = document.getElementById('qType').value;
            document.getElementById('mcq-fields').style.display = (type === 'mcq' || type === 'fill_blank') ? 'block' : 'none';
            document.getElementById('options-container').style.display = type === 'mcq' ? 'block' : 'none';
        }
    </script>
</body>
</html>
