<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Admin Panel - Set Assessment</h2>
        
        <form id="add-question-form">
            <label>Day Number:</label>
            <input type="number" id="dayNumber" min="1" max="5" value="1" required><br><br>

            <label>Question Type:</label>
            <select id="qType" onchange="toggleAdminOptions()">
                <option value="mcq">MCQ</option>
                <option value="fill_blank">Fill in the Blank</option>
                <option value="paragraph">Paragraph/Poem</option>
            </select><br><br>

            <label>Question Text:</label><br>
            <textarea id="qText" rows="3" style="width: 100%;" required></textarea><br><br>

            <div id="mcq-options">
                <label>Options (JSON format):</label><br>
                <input type="text" id="qOptions" placeholder='{"a":"Option 1", "b":"Option 2"}' style="width: 100%;"><br><br>
            </div>

            <label>Correct Answer (For auto-grading):</label>
            <input type="text" id="qCorrectAnswer" placeholder="e.g., a, or the exact blank word"><br><br>

            <button type="button" onclick="addQuestion()" class="btn">Add Question</button>
        </form>
        <br>
        <a href="index.html">Back to Home</a>
    </div>

    <script src="app.js"></script>
</body>
</html>
